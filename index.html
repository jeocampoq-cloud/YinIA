<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de YinIA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6d9 50%, #ff69b4 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            display: flex;
            gap: 40px;
            max-width: 1000px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .calculator-wrapper {
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4f0 100%);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            border: 5px solid #ff69b4;
            max-width: 350px;
            width: 100%;
        }

        .title {
            text-align: center;
            color: #ff1493;
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.2);
        }

        .display {
            background: linear-gradient(135deg, #fff5f9 0%, #ffe4f0 100%);
            border: 3px solid #ff69b4;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
            font-size: 32px;
            color: #ff1493;
            font-weight: bold;
            min-height: 60px;
            word-wrap: break-word;
            word-break: break-all;
            box-shadow: inset 0 4px 8px rgba(255, 105, 180, 0.1);
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 15px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .number-btn {
            background: linear-gradient(135deg, #ffb6d9 0%, #ff69b4 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 105, 180, 0.3);
        }

        .number-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.5);
        }

        .number-btn:active {
            transform: translateY(-1px);
        }

        .operator-btn {
            background: linear-gradient(135deg, #ff1493 0%, #ff69b4 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.3);
        }

        .operator-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.5);
        }

        .operator-btn:active {
            transform: translateY(-1px);
        }

        .equals-btn {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            color: white;
            grid-column: span 2;
            font-size: 20px;
            box-shadow: 0 4px 15px rgba(255, 20, 147, 0.4);
        }

        .equals-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 20, 147, 0.6);
        }

        .equals-btn:active {
            transform: translateY(-1px);
        }

        .clear-btn {
            background: linear-gradient(135deg, #ffc0cb 0%, #ffb6d9 100%);
            color: #ff1493;
            grid-column: span 2;
            font-size: 16px;
            border: 2px solid #ff69b4;
        }

        .clear-btn:hover {
            background: linear-gradient(135deg, #ffb6d9 0%, #ffc0cb 100%);
            transform: translateY(-3px);
        }

        .clear-btn:active {
            transform: translateY(-1px);
        }

        .special-functions {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .special-btn {
            background: linear-gradient(135deg, #ff85c0 0%, #ff69b4 100%);
            color: white;
            padding: 12px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
        }

        .special-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
        }

        .special-btn:active {
            transform: translateY(0);
        }

        .snoopy-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            min-width: 300px;
        }

        .snoopy-image {
            width: 280px;
            height: 280px;
            background: linear-gradient(135deg, #fff0f5 0%, #ffe4f0 100%);
            border-radius: 20px;
            border: 5px solid #ff69b4;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            position: relative;
        }

        .snoopy-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            animation: fadeIn 0.5s ease;
        }

        .snoopy-text-overlay {
            position: absolute;
            text-align: center;
            color: #ff69b4;
            font-size: 14px;
            padding: 20px;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .snoopy-text-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .snoopy-text {
            text-align: center;
            color: #ff1493;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 1px 1px 2px rgba(255, 105, 180, 0.2);
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                gap: 20px;
            }

            .snoopy-container {
                min-width: auto;
            }

            .snoopy-image {
                width: 250px;
                height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="calculator-wrapper">
            <div class="title">Calculadora de YinIA </div>
            
            <div class="display" id="display">0</div>

            <div class="buttons-grid">
                <button class="number-btn" onclick="appendNumber('7')">7</button>
                <button class="number-btn" onclick="appendNumber('8')">8</button>
                <button class="number-btn" onclick="appendNumber('9')">9</button>
                <button class="operator-btn" onclick="setOperator('/')">/</button>

                <button class="number-btn" onclick="appendNumber('4')">4</button>
                <button class="number-btn" onclick="appendNumber('5')">5</button>
                <button class="number-btn" onclick="appendNumber('6')">6</button>
                <button class="operator-btn" onclick="setOperator('*')">×</button>

                <button class="number-btn" onclick="appendNumber('1')">1</button>
                <button class="number-btn" onclick="appendNumber('2')">2</button>
                <button class="number-btn" onclick="appendNumber('3')">3</button>
                <button class="operator-btn" onclick="setOperator('-')">−</button>

                <button class="number-btn" onclick="appendNumber('0')">0</button>
                <button class="number-btn" onclick="appendNumber('.')">.</button>
                <button class="clear-btn" onclick="clearDisplay()">C</button>
                <button class="operator-btn" onclick="setOperator('+')">+</button>

                <button class="equals-btn" onclick="calculate()">=</button>
                <button class="clear-btn" onclick="deleteLast()">DEL</button>
            </div>

            <div class="special-functions">
                <button class="special-btn" onclick="calculateSquareRoot()">√x</button>
                <button class="special-btn" onclick="toggleSign()">+/−</button>
                <button class="special-btn" onclick="calculateSquare()">x²</button>
                <button class="special-btn" onclick="calculatePercent()">%</button>
            </div>
        </div>

        <div class="snoopy-container">
            <div class="snoopy-image" id="snoopyImage">
                <img id="snoopyImg" src="Imagenes/iniciosnoopy.jpg" alt="Snoopy">
                <div class="snoopy-text-overlay" id="textOverlay">
                    <div style="text-align: center;">
                        <div style="font-size: 16px; font-weight: bold;">¡Realiza una operación para que Snoopy aparezca!</div>
                    </div>
                </div>
            </div>
            <div class="snoopy-text" id="snoopyText">Esperando operación...</div>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let snoopyImg = document.getElementById('snoopyImg');
        let textOverlay = document.getElementById('textOverlay');
        let snoopyText = document.getElementById('snoopyText');
        let currentValue = '0';
        let previousValue = '';
        let operation = null;
        let shouldResetDisplay = false;
        let hasStartedOperation = false; // Bandera para saber si ya se realizó una operación

        // Array de imágenes de Snoopy - Rutas a las 45 imágenes
        const snoopyImages = [
            'Imagenes/Snoopy1.jfif',
            'Imagenes/Snoopy2.jfif',
            'Imagenes/Snoopy3.jfif',
            'Imagenes/Snoopy4.jfif',
            'Imagenes/Snoopy5.jfif',
            'Imagenes/Snoopy6.jfif',
            'Imagenes/Snoopy7.jfif',
            'Imagenes/Snoopy8.jfif',
            'Imagenes/Snoopy9.jfif',
            'Imagenes/Snoopy10.jfif',
            'Imagenes/Snoopy11.jfif',
            'Imagenes/Snoopy12.jfif',
            'Imagenes/Snoopy13.jfif',
            'Imagenes/Snoopy14.jfif',
            'Imagenes/Snoopy15.jfif',
            'Imagenes/Snoopy16.jfif',
            'Imagenes/Snoopy17.jfif',
            'Imagenes/Snoopy18.jfif',
            'Imagenes/Snoopy19.jfif',
            'Imagenes/Snoopy20.jfif',
            'Imagenes/Snoopy21.jfif',
            'Imagenes/Snoopy22.jfif',
            'Imagenes/Snoopy23.jfif',
            'Imagenes/Snoopy24.jfif',
            'Imagenes/Snoopy25.jfif',
            'Imagenes/Snoopy26.jfif',
            'Imagenes/Snoopy27.jfif',
            'Imagenes/Snoopy28.jfif',
            'Imagenes/Snoopy29.jfif',
            'Imagenes/Snoopy30.jfif',
            'Imagenes/Snoopy31.jfif',
            'Imagenes/Snoopy32.jfif',
            'Imagenes/Snoopy33.jfif',
            'Imagenes/Snoopy34.jfif',
            'Imagenes/Snoopy35.jfif',
            'Imagenes/Snoopy36.jfif',
            'Imagenes/Snoopy37.jfif',
            'Imagenes/Snoopy38.jfif',
            'Imagenes/Snoopy39.jfif',
            'Imagenes/Snoopy40.jfif',
            'Imagenes/Snoopy41.jfif',
            'Imagenes/Snoopy42.jfif',
            'Imagenes/Snoopy43.jfif',
            'Imagenes/Snoopy44.jfif',
            'Imagenes/Snoopy45.jfif'
        ];

        const operationMessages = {
            '+': '¡Snoopy suma felicidad! ➕',
            '-': '¡Snoopy resta problemas! ➖',
            '*': '¡Snoopy multiplica la diversión! ✖️',
            '/': '¡Snoopy divide el pastel! ÷',
            'sqrt': '¡Snoopy encuentra la raíz! √',
            'square': '¡Snoopy al cuadrado! ²',
            'percent': '¡Snoopy calcula el porcentaje! %',
            'sign': '¡Snoopy cambia de signo! ±'
        };

        function updateDisplay() {
            display.textContent = currentValue;
        }

        function appendNumber(num) {
            if (shouldResetDisplay) {
                currentValue = num;
                shouldResetDisplay = false;
            } else {
                if (currentValue === '0' && num !== '.') {
                    currentValue = num;
                } else if (num === '.' && currentValue.includes('.')) {
                    return;
                } else {
                    currentValue += num;
                }
            }
            updateDisplay();
        }

        function setOperator(op) {
            if (operation !== null) {
                calculate();
            }
            previousValue = currentValue;
            operation = op;
            shouldResetDisplay = true;
            showSnoopy(op);
        }

        function calculate() {
            if (operation === null || shouldResetDisplay) {
                return;
            }

            let result;
            const prev = parseFloat(previousValue);
            const current = parseFloat(currentValue);

            switch (operation) {
                case '+':
                    result = prev + current;
                    break;
                case '-':
                    result = prev - current;
                    break;
                case '*':
                    result = prev * current;
                    break;
                case '/':
                    result = current !== 0 ? prev / current : 0;
                    break;
                default:
                    return;
            }

            currentValue = result.toString();
            operation = null;
            shouldResetDisplay = true;
            updateDisplay();
            showSnoopy(operation || 'result');
        }

        function calculateSquareRoot() {
            const num = parseFloat(currentValue);
            if (num >= 0) {
                currentValue = Math.sqrt(num).toString();
                updateDisplay();
                showSnoopy('sqrt');
            }
        }

        function calculateSquare() {
            const num = parseFloat(currentValue);
            currentValue = (num * num).toString();
            updateDisplay();
            showSnoopy('square');
        }

        function calculatePercent() {
            const num = parseFloat(currentValue);
            currentValue = (num / 100).toString();
            updateDisplay();
            showSnoopy('percent');
        }

        function toggleSign() {
            const num = parseFloat(currentValue);
            currentValue = (-num).toString();
            updateDisplay();
            showSnoopy('sign');
        }

        function clearDisplay() {
            currentValue = '0';
            previousValue = '';
            operation = null;
            shouldResetDisplay = false;
            hasStartedOperation = false;
            updateDisplay();
            
            // Volver al estado inicial
            snoopyImg.src = 'Imagenes/iniciosnoopy.jpg';
            textOverlay.classList.remove('hidden');
            snoopyText.textContent = 'Esperando operación...';
        }

        function deleteLast() {
            if (currentValue.length > 1) {
                currentValue = currentValue.slice(0, -1);
            } else {
                currentValue = '0';
            }
            updateDisplay();
        }

        function showSnoopy(operationType) {
            // Marcar que ya se realizó una operación
            hasStartedOperation = true;
            
            // Ocultar el texto superpuesto
            textOverlay.classList.add('hidden');
            
            // Cambiar la imagen aleatoriamente
            const randomIndex = Math.floor(Math.random() * snoopyImages.length);
            const randomImage = snoopyImages[randomIndex];
            
            snoopyImg.src = randomImage;
            snoopyText.textContent = operationMessages[operationType] || '¡Snoopy está aquí! ';
        }

        // Inicializar
        updateDisplay();
    </script>
</body>
</html>
